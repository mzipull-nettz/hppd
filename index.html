<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 Happy Birthday 🎉</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
}

.card{
    background:white;
    width:90%;
    max-width:600px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    z-index:10;
}

h1{ color:#ff4081; }

button{
    padding:14px 25px;
    border:none;
    border-radius:12px;
    background:#ff4081;
    color:white;
    font-size:16px;
    cursor:pointer;
}

#pesan{
    display:none;
    margin-top:20px;
    line-height:1.8;
    animation:muncul 1s;
}

@keyframes muncul{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

.balon{
    position:absolute;
    bottom:-120px;
    font-size:40px;
    animation:naik linear infinite;
}

@keyframes naik{
    from{transform:translateY(0);}
    to{transform:translateY(-120vh);}
}

.confetti{
    position:absolute;
    top:-50px;
    font-size:20px;
    animation:jatuh linear forwards;
}

@keyframes jatuh{
    to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<div class="card">

<h1>🎂 Happy Birthday 🎉</h1>

<p>Ada pesan spesial buat kamu ✨</p>

<button onclick="bukaUcapan()">💖 Klik Di Sini 💖</button>

<div id="pesan">

<h2>🥳 Selamat Ulang Tahun! 🥳</h2>

<p>Semoga sehat selalu, bahagia selalu, dan semua wishlist kamu tercapai ✨</p>
<p>Semoga tahun ini penuh keberuntungan 🌷</p>
<p>Tetap semangat dan jadi lebih baik 💖</p>

<h3>🎂 Happy Birthday 🎂</h3>

</div>

</div>

<script>

/* ================= AUDIO FIX ================= */
let audioCtx;
let sudahMain = false;

function initAudio(){
    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === "suspended"){
        audioCtx.resume();
    }
}

/* ================= BUTTON ================= */
function bukaUcapan(){

if(sudahMain) return;
sudahMain = true;

document.getElementById("pesan").style.display="block";

buatConfetti();
mainkanLagu();
}

/* ================= CONFETTI SAFE ================= */
let confettiCount = 0;

function buatConfetti(){

if(confettiCount > 120) return;

for(let i=0;i<40;i++){

let c=document.createElement("div");
c.className="confetti";
c.innerHTML=["🎉","🎊","✨","💖","🎂"][Math.floor(Math.random()*5)];

c.style.left=Math.random()*100+"vw";
c.style.fontSize=(Math.random()*10+15)+"px";
c.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(c);

confettiCount++;

setTimeout(()=>{
c.remove();
confettiCount--;
},5000);

}
}

/* ================= BALON ================= */
for(let i=0;i<15;i++){
let b=document.createElement("div");
b.className="balon";
b.innerHTML="🎈";
b.style.left=Math.random()*100+"vw";
b.style.animationDuration=(Math.random()*8+8)+"s";
document.body.appendChild(b);
}

/* ================= AUDIO NOTE ================= */
function playNote(freq,duration){

initAudio();

const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();

osc.type="sine";
osc.frequency.value=freq;

gain.gain.setValueAtTime(0.2, audioCtx.currentTime);

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start();
osc.stop(audioCtx.currentTime + duration/1000);
}

/* ================= LAGU (FULL + STABIL) ================= */
function sleep(ms){
return new Promise(r=>setTimeout(r,ms));
}

async function mainkanLagu(){

const nada={
C4:261.63,
D4:293.66,
E4:329.63,
F4:349.23,
G4:392.00,
A4:440.00,
Bb4:466.16,
C5:523.25
};

const lagu = [

[nada.C4,400],[nada.C4,400],[nada.D4,800],[nada.C4,800],
[nada.F4,800],[nada.E4,1200],

[nada.C4,400],[nada.C4,400],[nada.D4,800],[nada.C4,800],
[nada.G4,800],[nada.F4,1200],

[nada.C4,400],[nada.C4,400],[nada.C5,800],[nada.A4,800],
[nada.F4,800],[nada.E4,800],[nada.D4,1200],

[nada.Bb4,400],[nada.Bb4,400],[nada.A4,800],[nada.F4,800],
[nada.G4,800],[nada.F4,1500]
];

for(let i=0;i<lagu.length;i++){
playNote(lagu[i][0], lagu[i][1]);
await sleep(lagu[i][1]);
}
}

</script>

</body>
</html>
